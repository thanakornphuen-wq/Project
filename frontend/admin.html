<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการสถานะ - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background-color: #f0f2f5; }
        .admin-header {
            background: linear-gradient(135deg, #dc3545 0%, #a71d2a 100%);
            color: white;
            padding: 40px 0 90px 0;
            text-align: center;
        }
        .admin-header h1 { font-size: 2.2rem; font-weight: bold; }
        .admin-header p { opacity: 0.9; }
        .overlap-container { margin-top: -50px; position: relative; z-index: 10; }
        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn-back {
            background-color: #28a745; color: white !important; text-decoration: none;
            padding: 8px 18px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-back:hover { background-color: #1e7e34; color: white !important; transform: translateY(-1px); }
        .btn-list {
            background-color: #007bff; color: white; text-decoration: none;
            padding: 8px 18px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; transition: 0.2s;
        }
        .btn-list:hover { background-color: #0056b3; color: white; transform: translateY(-1px); }
        .action-btn {
            border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.82em;
            font-weight: 600; cursor: pointer; transition: 0.2s; margin: 2px;
        }
        .action-btn:hover { transform: translateY(-1px); opacity: 0.85; }
        .btn-processing { background-color: #17a2b8; color: white; }
        .btn-resolved   { background-color: #28a745; color: white; }
        .btn-pending    { background-color: #ffc107; color: #333; }
        .status-badge {
            padding: 5px 12px; border-radius: 50px; font-size: 0.78em;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .status-pending   { background-color: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        .status-processing { background-color: #d1ecf1; color: #0c5460; border: 1px solid #17a2b8; }
        .status-resolved  { background-color: #d4edda; color: #155724; border: 1px solid #28a745; }
        #toast {
            position: fixed; bottom: 30px; right: 30px; background: #28a745;
            color: white; padding: 12px 22px; border-radius: 10px; font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; z-index: 9999;
        }
        .table-wrapper { overflow-x: auto; border-radius: 10px; }
        table { min-width: 600px; }
        td { vertical-align: middle; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>🛠️ แผงควบคุม Admin</h1>
        <p>จัดการและอัปเดตสถานะรายการแจ้งเหตุจากประชาชน</p>
    </div>

    <div class="container overlap-container pb-5">
        <div class="card shadow border-0" style="border-radius:15px;">
            <div class="card-body p-4">

                <div class="nav-links">
                    <a href="index.html" class="btn-back">แจ้งเหตุใหม่</a>
                    <a href="list.html" class="btn-list">ดูรายการทั้งหมด</a>
                </div>

                <h5 class="mb-3" style="color:#dc3545;">📋 รายการแจ้งเหตุทั้งหมด</h5>

                <div id="loadingMsg" class="text-center text-muted py-4">กำลังโหลดข้อมูล...</div>

                <div class="table-wrapper" id="tableWrapper" style="display:none;">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>หัวข้อ</th>
                                <th>รายละเอียด</th>
                                <th>ผู้แจ้ง</th>
                                <th>สถานะปัจจุบัน</th>
                                <th>เปลี่ยนสถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="adminList"></tbody>
                    </table>
                </div>

                <div id="emptyMsg" class="text-center text-muted py-4" style="display:none;">
                    📭 ยังไม่มีรายการแจ้งเหตุ
                </div>

            </div>
        </div>
    </div>

    <div id="toast">อัปเดตสถานะเรียบร้อยแล้ว!</div>

    <script src="assets/js/admin.js"></script>
</body>
</html>
