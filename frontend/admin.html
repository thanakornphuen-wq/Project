<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #0f172a; --accent: #3b82f6; --accent2: #60a5fa;
            --danger: #ef4444; --danger2: #fca5a5;
            --surface: #ffffff; --surface2: #f8fafc; --border: #e2e8f0;
            --text: #0f172a; --text2: #475569; --text3: #94a3b8;
            --pending-bg: #fefce8; --pending-text: #854d0e; --pending-border: #fde047;
            --processing-bg: #eff6ff; --processing-text: #1d4ed8; --processing-border: #93c5fd;
            --resolved-bg: #f0fdf4; --resolved-text: #166534; --resolved-border: #86efac;
        }
        body { font-family: 'Sarabun', sans-serif; background: var(--surface2); color: var(--text); min-height: 100vh; }

        /* HERO — red tone for admin */
        .hero {
            background: linear-gradient(135deg, #0f172a 0%, #134e4a 60%, #0f766e 100%);
            position: relative; overflow: hidden; padding: 52px 0 90px;
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 600px 350px at 85% 50%, rgba(20,184,166,0.1) 0%, transparent 70%);
        }
        .hero-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
        }
        .hero-inner {
            position: relative; max-width: 1100px; margin: 0 auto; padding: 0 24px;
            display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35);
            color: #fff; font-size: 0.75rem; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            padding: 4px 12px; border-radius: 100px; margin-bottom: 14px;
        }
        .hero-badge::before { content: '●'; font-size: 0.5rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .hero h1 { font-family: 'Prompt', sans-serif; font-size: clamp(1.8rem,4vw,2.6rem); font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 8px; }
        .hero p { color: #94a3b8; font-size: 1rem; font-weight: 300; }
        .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-hero {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 10px 20px; border-radius: 10px;
            font-family: 'Sarabun', sans-serif; font-size: 0.9rem; font-weight: 600;
            text-decoration: none; transition: all 0.2s; cursor: pointer; border: none;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59,130,246,0.35); color: white; }
        .btn-outline { background: rgba(255,255,255,0.08); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.15); }
        .btn-outline:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); color: white; }

        /* MAIN */
        .main { max-width: 1100px; margin: -40px auto 60px; padding: 0 24px; position: relative; z-index: 10; }

        /* TABLE CARD */
        .table-card {
            background: white; border-radius: 20px; border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden;
        }
        .table-card-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .table-card-title { font-family: 'Prompt', sans-serif; font-size: 1rem; font-weight: 600; }
        .count-badge {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text3); font-size: 0.75rem; font-weight: 700;
            padding: 2px 10px; border-radius: 100px;
        }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { padding: 12px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface2); }
        td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #f8fafc; }

        /* STATUS PILL */
        .status-pill {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; border: 1.5px solid;
        }
        .status-pill.pending    { background: var(--pending-bg);    color: var(--pending-text);    border-color: var(--pending-border); }
        .status-pill.processing { background: var(--processing-bg); color: var(--processing-text); border-color: var(--processing-border); }
        .status-pill.resolved   { background: var(--resolved-bg);   color: var(--resolved-text);   border-color: var(--resolved-border); }

        /* ACTION BTNS */
        .action-btn {
            display: inline-flex; align-items: center; gap: 4px;
            border: none; padding: 5px 11px; border-radius: 7px;
            font-size: 0.78em; font-weight: 600; cursor: pointer;
            transition: all 0.15s; margin: 2px; font-family: 'Sarabun', sans-serif;
        }
        .action-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn-pending    { background: #fef9c3; color: #854d0e; }
        .btn-processing { background: #dbeafe; color: #1d4ed8; }
        .btn-resolved   { background: #dcfce7; color: #166534; }
        .btn-delete     { background: #fee2e2; color: #991b1b; }

        /* AVATAR */
        .avatar {
            width: 30px; height: 30px;
            background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
            border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 0.72rem; font-weight: 700; margin-right: 8px; vertical-align: middle;
        }

        /* EMPTY / LOADING */
        .state-box { text-align: center; padding: 60px 20px; color: var(--text3); }
        .state-box .icon { font-size: 3rem; margin-bottom: 12px; }

        /* TOAST */
        #toast {
            position: fixed; bottom: 30px; right: 30px;
            background: #166534; color: white;
            padding: 12px 22px; border-radius: 12px; font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: none; z-index: 9999;
            font-family: 'Sarabun', sans-serif; font-size: 0.9rem;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-grid"></div>
    <div class="hero-inner">
        <div>
            <div class="hero-badge">สำหรับเจ้าหน้าที่</div>
            <h1>แผงควบคุม<br>เจ้าหน้าที่</h1>
            <p>จัดการและอัปเดตสถานะรายการแจ้งเหตุจากประชาชน</p>
        </div>
        <div class="hero-actions">
            <a href="index.html" class="btn-hero btn-primary">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                แจ้งเหตุใหม่
            </a>
            <a href="list.html" class="btn-hero btn-outline">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                ดูรายการทั้งหมด
            </a>
        </div>
    </div>
</div>

<div class="main">
    <!-- Table -->
    <div class="table-card">
        <div class="table-card-header">
            <span class="table-card-title">รายการแจ้งเหตุทั้งหมด</span>
            <span class="count-badge" id="countBadge">0 รายการ</span>
        </div>
        <div id="loadingMsg" class="state-box"><div class="icon"></div><p>กำลังโหลดข้อมูล...</p></div>
        <div id="emptyMsg" class="state-box" style="display:none;"><div class="icon">📭</div><p>ยังไม่มีรายการแจ้งเหตุ</p></div>
        <div class="table-wrap" id="tableWrapper" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>หัวข้อ</th>
                        <th>รายละเอียด</th>
                        <th>ผู้แจ้ง</th>
                        <th>สถานะ</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="adminList"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="assets/js/admin.js"></script>
<script>
// override loadComplaints เพื่ออัปเดต stats bar
const _origLoad = loadComplaints;
// patch renderRows หลัง admin.js โหลดเสร็จ
document.addEventListener('DOMContentLoaded', () => {});

// patch stats หลังข้อมูลโหลด — admin.js เรียก loadComplaints() ที่ update tbody แล้ว
// เราใช้ MutationObserver จับการเปลี่ยนแปลง tbody แล้วนับ
const observer = new MutationObserver(() => {
    const rows = document.querySelectorAll('#adminList tr');
    let all=0, pending=0, processing=0, resolved=0;
    rows.forEach(r => {
        const pill = r.querySelector('.status-pill');
        if (!pill) return;
        all++;
        if (pill.classList.contains('pending'))    pending++;
        if (pill.classList.contains('processing')) processing++;
        if (pill.classList.contains('resolved'))   resolved++;
    });
    });
observer.observe(document.getElementById('adminList'), { childList: true, subtree: true });
</script>
</body>
</html>
