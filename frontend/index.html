<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งปัญหาเมือง</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #0f172a; --navy2: #1e293b; --accent: #3b82f6;
            --surface2: #f8fafc; --border: #e2e8f0;
            --text: #0f172a; --text2: #475569; --text3: #94a3b8;
            --success-bg: #f0fdf4; --success-text: #166534; --success-border: #86efac;
            --error-bg: #fef2f2; --error-text: #991b1b; --error-border: #fca5a5;
        }
        body { font-family: 'Sarabun', sans-serif; background: var(--surface2); color: var(--text); min-height: 100vh; }

        /* HERO — deep navy */
        .hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #1e40af 100%);
            position: relative; overflow: hidden; padding: 52px 0 90px;
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 600px 350px at 85% 50%, rgba(59,130,246,0.12) 0%, transparent 70%);
        }
        .hero-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
        }
        .hero-inner {
            position: relative; max-width: 640px; margin: 0 auto; padding: 0 28px;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #93c5fd; font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 5px 14px; border-radius: 100px; margin-bottom: 18px;
        }
        .hero-badge::before { content: '●'; font-size: 0.45rem; animation: pulse 2s infinite; opacity: 0.7; }
        @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:0.2} }
        .hero h1 {
            font-family: 'Prompt', sans-serif;
            font-size: clamp(1.9rem, 4vw, 2.6rem); font-weight: 700;
            color: #f1f5f9; line-height: 1.25; margin-bottom: 10px;
        }
        .hero p { color: #64748b; font-size: 0.95rem; font-weight: 400; margin-bottom: 24px; }
        .hero-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-hero {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 9px 18px; border-radius: 8px;
            font-family: 'Sarabun', sans-serif; font-size: 0.85rem; font-weight: 600;
            text-decoration: none; transition: all 0.2s; cursor: pointer; border: none;
        }
        .btn-outline { background: rgba(255,255,255,0.07); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.12); }
        .btn-outline:hover { background: rgba(255,255,255,0.13); color: white; transform: translateY(-1px); }

        /* MAIN */
        .main { max-width: 640px; margin: -44px auto 60px; padding: 0 28px; position: relative; z-index: 10; }

        /* FORM CARD */
        .form-card {
            background: white; border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .card-top {
            padding: 22px 28px 20px;
            border-bottom: 1px solid var(--border);
        }
        .card-top-title { font-family: 'Prompt', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text); }
        .card-top-sub { font-size: 0.8rem; color: var(--text3); margin-top: 2px; }
        .card-body { padding: 24px 28px 28px; }

        /* FIELDS */
        .field-group { margin-bottom: 18px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
        @media(max-width: 480px) { .field-row { grid-template-columns: 1fr; } }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
        input, textarea {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-family: 'Sarabun', sans-serif; font-size: 0.9rem;
            outline: none; transition: 0.2s; background: #fafafa; color: var(--text);
        }
        input:focus, textarea:focus {
            border-color: var(--accent); background: white;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        textarea { resize: vertical; min-height: 110px; }

        /* FILE */
        .file-drop {
            border: 1.5px dashed #cbd5e1; border-radius: 10px;
            padding: 22px; text-align: center; cursor: pointer;
            transition: 0.2s; background: #fafafa; position: relative;
        }
        .file-drop:hover { border-color: var(--accent); background: #eff6ff; }
        .file-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; padding: 0; border: none; background: none; box-shadow: none; }
        .file-text { font-size: 0.83rem; color: var(--text3); }
        .file-text strong { color: var(--accent); }
        #fileName { font-size: 0.78rem; color: var(--accent); margin-top: 4px; font-weight: 500; }

        /* DIVIDER */
        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 20px 0; color: var(--text3); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* SUBMIT */
        .btn-submit {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white; border: none; border-radius: 10px;
            font-family: 'Prompt', sans-serif; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 3px 12px rgba(59,130,246,0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
        .btn-submit:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

        /* MESSAGE */
        #responseMessage { display: none; margin-top: 12px; padding: 11px 14px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; text-align: center; }
        .msg-success { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
        .msg-error   { background: var(--error-bg);   color: var(--error-text);   border: 1px solid var(--error-border); }

        /* BOTTOM LINKS */
        .bottom-links { display: flex; justify-content: center; gap: 20px; margin-top: 18px; flex-wrap: wrap; }
        .link-item { display: inline-flex; align-items: center; gap: 5px; color: var(--text3); font-size: 0.82rem; text-decoration: none; transition: color 0.2s; font-weight: 500; }
        .link-item:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-grid"></div>
    <div class="hero-inner">
        <div class="hero-badge">ระบบแจ้งปัญหาเมือง</div>
        <h1>แจ้งปัญหาเมืองของคุณ</h1>
        <p>กรอกรายละเอียดเพื่อให้เจ้าหน้าที่เข้าตรวจสอบ</p>
        <div class="hero-links">
            <a href="list.html" class="btn-hero btn-outline">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                ดูรายการทั้งหมด
            </a>
            <a href="admin.html" class="btn-hero btn-outline">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Admin
            </a>
        </div>
    </div>
</div>

<div class="main">
    <div class="form-card">
        <div class="card-top">
            <div class="card-top-title">แจ้งปัญหาใหม่</div>
            <div class="card-top-sub">กรอกข้อมูลให้ครบเพื่อให้เจ้าหน้าที่ติดต่อกลับได้</div>
        </div>
        <div class="card-body">
            <form id="complaintForm">
                <div class="field-row">
                    <div class="field-group">
                        <label>ชื่อ-นามสกุล</label>
                        <input type="text" id="full_name" placeholder="เช่น สมชาย ใจดี">
                    </div>
                    <div class="field-group">
                        <label>เบอร์โทรติดต่อ</label>
                        <input type="tel" id="phone_number" placeholder="เช่น 0812345678">
                    </div>
                </div>
                <div class="field-group">
                    <label>หัวข้อเรื่อง</label>
                    <input type="text" id="title" placeholder="เช่น ท่อประปาแตก ถนนชำรุด">
                </div>
                <div class="field-group">
                    <label>รายละเอียด</label>
                    <textarea id="description" placeholder="ระบุตำแหน่ง รายละเอียด..."></textarea>
                </div>
                <div class="divider">แนบรูปภาพ (ถ้ามี)</div>
                <div class="field-group">
                    <div class="file-drop">
                        <input type="file" id="image" accept="image/*" onchange="updateFileName(this)">
                        <div class="file-text"><strong>คลิกเพื่อเลือกรูป</strong> หรือลากไฟล์มาวาง</div>
                        <div id="fileName"></div>
                    </div>
                </div>
                <button type="button" id="submitBtn" class="btn-submit">ส่งข้อมูลแจ้งเหตุ</button>
                <div id="responseMessage"></div>
            </form>
            <div class="bottom-links">
                <a href="list.html" class="link-item">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    ดูรายการแจ้งเหตุทั้งหมด
                </a>
                <a href="admin.html" class="link-item">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    หน้าจัดการ Admin
                </a>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/app.js"></script>
<script>
function updateFileName(input) {
    const el = document.getElementById('fileName');
    el.textContent = input.files[0] ? '🖼️ ' + input.files[0].name : '';
}
</script>
</body>
</html>
