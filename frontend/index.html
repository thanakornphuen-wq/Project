<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>ระบบแจ้งปัญหาประชาชน</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .hero-section {
        background: #007bff;
        color: white;
        padding: 40px 0;
      }
    </style>
  </head>
  <body>
    <div class="hero-section">
      <div
        class="container"
        style="background: transparent; box-shadow: none; border-radius: 0"
      >
        <h1>📢 แจ้งปัญหาเมือง</h1>
        <p>กรอกรายละเอียดการแจ้งเหตุด้านล่างเพื่อให้เจ้าหน้าที่เข้าตรวจสอบ</p>
      </div>
    </div>
    <div class="container overlap-container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow border-0" style="border-radius: 15px">
            <div class="card-body p-4">
              <h4 class="card-title mb-4" style="color: #007bff">
                📋 แจ้งปัญหาใหม่
              </h4>
              <form id="complaintForm">
                <div class="mb-3">
                  <label class="form-label">ชื่อ-นามสกุล</label>
                  <input
                    type="text"
                    id="full_name"
                    class="form-control"
                    placeholder="เช่น สมชาย ใจดี"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">เบอร์โทรติดต่อ</label>
                  <input
                    type="tel"
                    id="phone_number"
                    class="form-control"
                    placeholder="เช่น 0812345678"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">หัวข้อเรื่อง</label>
                  <input
                    type="text"
                    id="title"
                    class="form-control"
                    placeholder="เช่น ท่อประปาแตก"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">รายละเอียด</label>
                  <textarea
                    id="description"
                    class="form-control"
                    rows="4"
                    placeholder="ระบุตำแหน่งหรือรายละเอียดเพิ่มเติม..."
                    required
                  ></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label">แนบรูปภาพ</label>
                  <input
                    type="file"
                    id="image"
                    class="form-control"
                    accept="image/*"
                  />
                </div>

                <div class="text-center mt-4">
                  <button
                    type="button"
                    id="submitBtn"
                    class="btn-submit w-100"
                  >
                       ส่งข้อมูลแจ้งเหตุ
                  </button>

                  <div
                    id="responseMessage"
                    class="mt-3"
                    style="
                      display: none;
                      padding: 10px;
                      border-radius: 8px;
                      font-weight: 500;
                    "
                  ></div>

                  <div class="mt-3 d-flex justify-content-center gap-3 flex-wrap">
                    <a href="list.html" class="btn-nav">📋 ดูรายการแจ้งเหตุทั้งหมด</a>
                    <a href="admin.html" class="btn-nav btn-nav-admin">🛠️ หน้าจัดการ Admin</a>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/js/app.js"></script>
  </body>
</html>
